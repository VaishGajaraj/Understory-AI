# Toy benchmark: synthetic coherence stack + fixture labels, runs in CI.
# The stack generator injects a persistent linear anomaly (the "road") and a
# transient diffuse anomaly (the "rain") into correlated noise; a correct
# detector finds the first and ignores the second.
name: toy
aoi: aoi.yaml
start: "2026-01-01"
end: "2026-03-01"
detector: v0-filters
labels: ../../packages/understory-labels/data/events/toy-fixtures.geojson
stack_store: data/toy-stack.zarr # generated by scripts/make_toy_stack.py, small enough to commit
report_out: reports/toy.json
