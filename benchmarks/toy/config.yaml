# Toy benchmark: synthetic coherence stack + fixture labels, runs in CI.
# The stack generator (scripts/make_toy_stack.py) injects a persistent linear
# anomaly (the "road") and a transient diffuse anomaly (the "rain") into
# per-pixel noise; a correct detector finds the first and ignores the second.
name: toy
aoi: aoi.yaml
start: "2025-12-01"
end: "2026-03-15"
detector: v0-filters
labels: ../../packages/understory-labels/data/events/toy-fixtures.geojson
stack_store: data/toy-stack.zarr # generated: uv run python scripts/make_toy_stack.py
report_out: reports/toy.json
synthetic: true # kill-criteria passes on this benchmark are scaffolding, not claims
