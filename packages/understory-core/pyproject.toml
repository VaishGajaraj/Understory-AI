[project]
name = "understory-core"
version = "0.1.0"
description = "NISAR data plumbing: granule discovery, retrieval, coherence stack construction, tiling, caching"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "asf-search>=8.0",
    "numpy>=1.26",
    "xarray>=2024.1",
    "dask[array]>=2024.1",
    "rasterio>=1.3",
    "rioxarray>=0.15",
    "zarr>=2.17",
    "geopandas>=1.0",
    "shapely>=2.0",
    "pyproj>=3.6",
    "pystac>=1.10",
    "pydantic>=2.6",
    "pyyaml>=6.0",
    "h5py>=3.10",
    "requests>=2.31",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/understory_core"]
