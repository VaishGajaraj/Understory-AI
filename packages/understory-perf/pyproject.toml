[project]
name = "understory-perf"
version = "0.1.0"
description = "Load and latency harness for the Understory detection pipeline"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "numpy>=1.26",
    "pandas>=2.0",
    "psutil>=5.9",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "understory-core",
    "understory-detect",
    "xarray>=2024.1",
]

[project.scripts]
understory-load = "understory_perf.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/understory_perf"]
