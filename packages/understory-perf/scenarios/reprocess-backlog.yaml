# The Q4 2026 validated-reprocessing campaign: every product is reissued, so
# every stack is rebuilt from a full year of history (30 pairs) and every
# benchmark rerun. Arrives all at once with a 30-day window to clear.
#
# The steady cycle keeps running underneath and is not modeled here — subtract
# its utilization from available capacity before reading this verdict.
name: reprocess-backlog-2
shape: reprocess-backlog
n_aoi: 2
posting: coarse
aoi_side_km: 100.0
# Pinned, not left to cpu_count-1: docs/PERFORMANCE.md quotes these rows,
# and utilization scales linearly in worker count, so an unpinned default
# would make the published table irreproducible on any other machine.
workers: 4
compression: 1.0e-4
report_out: reports/reprocess-backlog-2.json
