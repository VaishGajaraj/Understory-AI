# The spike test: one repeat cycle's work landing inside 5% of the cycle window.
# Identical volume to steady-cycle-9 and an identical deadline, so any
# difference between the two runs is burst behaviour and not throughput.
name: cycle-burst-6
shape: cycle-burst
n_aoi: 6
stack_depth: 24
posting: coarse # 80 m GUNW coherence layer
aoi_side_km: 100.0
# Pinned, not left to cpu_count-1: docs/PERFORMANCE.md quotes these rows,
# and utilization scales linearly in worker count, so an unpinned default
# would make the published table irreproducible on any other machine.
workers: 4
compression: 1.0e-4
report_out: reports/cycle-burst-6.json
