# Ordinary operations: one new pair per frame group per 12-day cycle, arriving
# spread across the cycle as ASF forward-processes per datatake. This is the
# load the system must sustain indefinitely.
#
# 9 AOIs is a measurement size, not a capacity claim. Utilization is summed
# service time over (deadline x workers), so it extrapolates linearly; the
# harness reports the AOI count this configuration actually supports as
# capacity.aoi_at_slo_utilization.
name: steady-cycle-6
shape: steady-cycle
n_aoi: 6
stack_depth: 24
posting: coarse # 80 m GUNW coherence layer
aoi_side_km: 100.0
# Pinned, not left to cpu_count-1: docs/PERFORMANCE.md quotes these rows,
# and utilization scales linearly in worker count, so an unpinned default
# would make the published table irreproducible on any other machine.
workers: 4
# Replay the 12-day arrival pattern ~10,000x faster. Arrival *spacing* is
# compressed; service time, memory and throughput are measured, never scaled.
compression: 1.0e-4
report_out: reports/steady-cycle-6.json
