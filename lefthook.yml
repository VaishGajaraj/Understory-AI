# Pre-commit stays formatting-only (fast); typecheck + tests run in CI.
pre-commit:
  parallel: true
  commands:
    ruff:
      glob: "*.py"
      run: uv run ruff format {staged_files} && uv run ruff check --fix {staged_files}
      stage_fixed: true
    biome:
      glob: "*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc}"
      run: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
